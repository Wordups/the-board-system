<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --surface: #eceef1;
  --surface-2: #e2e5ea;
  --surface-3: #d4d8de;
  --border: #c5c9d0;
  --border-2: #b3b8bf;
  --text: #1a1d21;
  --text-2: #5b616b;
  --text-3: #8a909a;
  --gold: #2f9e57;
  --gold-dim: rgba(47,158,87,0.12);
  --green: #2f9e57;
  --green-dim: rgba(47,158,87,0.12);
  --red: #e0443e;
  --red-dim: rgba(224,68,62,0.12);
  --blue: #2f7fd4;
  --blue-dim: rgba(47,127,212,0.12);
  --mlb: #df2020;
  --nba: #1d6bbf;
  --wnba: #e07a1f;
  --nfl: #2f9e57;
  --soccer: #0284c7;
  --tennis: #8257d9;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: "Barlow", sans-serif;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

button, input, select { font: inherit; }
button { cursor: pointer; border: none; background: none; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }

/* HEADER */
.site-header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}

.header-inner {
  max-width: 1400px; margin: 0 auto; padding: 0 20px;
  display: flex; align-items: center; justify-content: space-between;
  height: 52px; gap: 20px;
}

.wordmark {
  font-family: "Barlow Condensed", sans-serif;
  font-size: 22px; font-weight: 900;
  letter-spacing: 3px; text-transform: uppercase; color: var(--text);
}
.wordmark span { color: var(--text); }

.header-meta { display: flex; align-items: center; gap: 16px; }

.date-badge {
  font-family: "Barlow Condensed", sans-serif;
  font-size: 13px; font-weight: 600;
  letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-3);
}

.updated-badge { font-size: 11px; color: var(--text-3); }
.updated-badge span { color: var(--green); font-weight: 600; }

/* SPORT TABS */
.sport-tabs {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow-x: auto; scrollbar-width: none;
}
.sport-tabs::-webkit-scrollbar { display: none; }

.tabs-inner {
  max-width: 1400px; margin: 0 auto; padding: 0 20px;
  display: flex; gap: 0;
}

.sport-tab {
  display: flex; align-items: center; gap: 7px;
  padding: 12px 18px;
  font-family: "Barlow Condensed", sans-serif;
  font-size: 13px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-3);
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s; white-space: nowrap;
}
.sport-tab:hover { color: var(--text-2); }
.sport-tab[data-sport="picks"].active { border-bottom-color: var(--gold); color: var(--text); }
.sport-tab[data-sport="mlb"].active { border-bottom-color: var(--mlb); color: var(--text); }
.sport-tab[data-sport="nba"].active { border-bottom-color: var(--nba); color: var(--text); }
.sport-tab[data-sport="wnba"].active { border-bottom-color: var(--wnba); color: var(--text); }
.sport-tab[data-sport="nfl"].active { border-bottom-color: var(--nfl); color: var(--text); }
.sport-tab[data-sport="soccer"].active { border-bottom-color: var(--soccer); color: var(--text); }
.sport-tab[data-sport="tennis"].active { border-bottom-color: var(--tennis); color: var(--text); }

.tab-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.sport-tab[data-sport="picks"] .tab-dot { background: var(--gold); }
.sport-tab[data-sport="mlb"] .tab-dot { background: var(--mlb); }
.sport-tab[data-sport="nba"] .tab-dot { background: var(--nba); }
.sport-tab[data-sport="wnba"] .tab-dot { background: var(--wnba); }
.sport-tab[data-sport="nfl"] .tab-dot { background: var(--nfl); }
.sport-tab[data-sport="soccer"] .tab-dot { background: var(--soccer); }
.sport-tab[data-sport="tennis"] .tab-dot { background: var(--tennis); }

.tab-count {
  background: var(--surface-3); color: var(--text-3);
  border-radius: 3px; padding: 1px 5px;
  font-size: 10px; font-weight: 700;
}
.sport-tab.active .tab-count { background: var(--gold-dim); color: var(--gold); }

/* MAIN LAYOUT */
.main {
  max-width: 1680px; margin: 0 auto; padding: 20px;
  display: block;
}

/* PINNED BOARD */
.pinned-board { display: none; }
.pinned-stack {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
}

.mlb-board-shell {
  display: grid;
  grid-template-columns: minmax(0, 1.45fr) minmax(260px, 0.8fr);
  gap: 14px;
}

.mlb-board-main,
.mlb-board-side {
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-width: 0;
}

.mlb-board-compact .board-header {
  align-items: flex-start;
}

.board-header-copy {
  display: flex;
  flex-direction: column;
  gap: 3px;
  min-width: 0;
}

.board-subtitle {
  font-size: 11px;
  color: var(--text-3);
  max-width: 34ch;
}

.core-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
  padding: 14px;
}

.core-card {
  position: relative;
  min-width: 0;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(0,0,0,0.03), rgba(0,0,0,0.01)), var(--surface);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.core-card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: linear-gradient(180deg, rgba(47,158,87,0.12), transparent 35%);
  pointer-events: none;
}

.core-card-top,
.watchlist-row-top {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.core-rank-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.core-rank {
  font-family: "Barlow Condensed", sans-serif;
  font-size: 22px;
  font-weight: 900;
  color: var(--gold);
  line-height: 1;
  width: 22px;
  text-align: center;
}

.core-base-label {
  font-size: 10px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 2px;
}

.core-face {
  width: 42px;
  height: 42px;
  border-radius: 50%;
}

.core-body,
.watchlist-body {
  position: relative;
  z-index: 1;
  min-width: 0;
}

.core-name,
.watchlist-name {
  font-family: "Barlow Condensed", sans-serif;
  font-size: 18px;
  font-weight: 800;
  letter-spacing: 0.3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.core-meta,
.watchlist-meta {
  margin-top: 3px;
  font-size: 11px;
  color: var(--text-3);
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.core-line-row,
.watchlist-line-row {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  gap: 8px;
}

.core-line {
  font-family: "Barlow Condensed", sans-serif;
  font-size: 16px;
  font-weight: 800;
  color: var(--gold);
}

.core-score {
  font-family: "Barlow Condensed", sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-2);
}

.watchlist-list,
.support-list {
  display: flex;
  flex-direction: column;
}

.watchlist-row,
.support-row {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
}

.watchlist-row:last-child,
.support-row:last-child {
  border-bottom: none;
}

.watchlist-row:hover,
.support-row:hover {
  background: var(--surface-2);
}

.watchlist-rank {
  font-family: "Barlow Condensed", sans-serif;
  font-size: 16px;
  font-weight: 900;
  color: var(--text-3);
  width: 18px;
  text-align: center;
  flex-shrink: 0;
}

.watchlist-rank.top {
  color: var(--gold);
}

.watchlist-rank-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}

.support-row {
  gap: 6px;
}

.support-row-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.support-left {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.support-copy {
  min-width: 0;
}

.support-title-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.support-name {
  font-family: "Barlow Condensed", sans-serif;
  font-size: 15px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.support-line {
  font-family: "Barlow Condensed", sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-2);
  white-space: nowrap;
}

.support-meta {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 2px;
}

.support-score {
  font-family: "Barlow Condensed", sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-2);
  white-space: nowrap;
}

.support-row.hits-muted {
  opacity: 0.72;
}

.board-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
}

.board-header {
  padding: 12px 16px; background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}

.board-title {
  font-family: "Barlow Condensed", sans-serif;
  font-size: 14px; font-weight: 800;
  letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold);
}

.board-count { font-size: 11px; color: var(--text-3); font-family: "Barlow Condensed", sans-serif; letter-spacing: 1px; }

.pinned-row {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 16px; border-bottom: 1px solid var(--border);
  transition: background 0.12s;
}
.pinned-row:last-child { border-bottom: none; }
.pinned-row:hover { background: var(--surface-2); }

.pinned-rank {
  font-family: "Barlow Condensed", sans-serif;
  font-size: 20px; font-weight: 900; color: var(--text-3);
  width: 22px; flex-shrink: 0; line-height: 1;
}
.pinned-rank.top { color: var(--gold); }

.player-face {
  width: 34px; height: 34px; border-radius: 50%;
  object-fit: cover; flex-shrink: 0;
  background: var(--surface-3); border: 1px solid var(--border);
}

.player-face-sm {
  width: 28px; height: 28px; border-radius: 50%;
  object-fit: cover; flex-shrink: 0;
  background: var(--surface-3); border: 1px solid var(--border);
}

.sport-fallback {
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--surface-3); border: 1px solid var(--border);
  flex-shrink: 0;
  font-size: 16px; line-height: 1;
}
.player-face.sport-fallback { font-size: 18px; }
.player-face-sm.sport-fallback { font-size: 14px; }
.core-face.sport-fallback { font-size: 22px; }
.hero-player-face.sport-fallback { font-size: 36px; }
.pick-poster-face.sport-fallback { font-size: 28px; }
.sport-fallback[data-sport="mlb"] { background: rgba(223,32,32,0.10); border-color: rgba(223,32,32,0.30); }
.sport-fallback[data-sport="nba"] { background: rgba(29,107,191,0.10); border-color: rgba(29,107,191,0.30); }
.sport-fallback[data-sport="wnba"] { background: rgba(224,122,31,0.10); border-color: rgba(224,122,31,0.30); }
.sport-fallback[data-sport="nfl"] { background: rgba(22,163,74,0.10); border-color: rgba(22,163,74,0.30); }
.sport-fallback[data-sport="soccer"] { background: rgba(2,132,199,0.10); border-color: rgba(2,132,199,0.30); }
.sport-fallback[data-sport="tennis"] { background: rgba(130,87,217,0.10); border-color: rgba(130,87,217,0.30); }

.pinned-info { flex: 1; min-width: 0; }

.pinned-name {
  font-family: "Barlow Condensed", sans-serif;
  font-size: 15px; font-weight: 700; letter-spacing: 0.5px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.pinned-meta { font-size: 11px; color: var(--text-3); margin-top: 1px; display: flex; align-items: center; gap: 5px; }
.pinned-line { font-family: "Barlow Condensed", sans-serif; font-size: 13px; font-weight: 700; color: var(--gold); flex-shrink: 0; }
.sim-prob-badge { font-family: "Barlow Condensed", sans-serif; font-weight: 800; font-size: 13px; color: var(--blue); background: var(--blue-dim); border-radius: 6px; padding: 2px 7px; flex-shrink: 0; }

.tier-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 20px; height: 20px; border-radius: 4px;
  font-family: "Barlow Condensed", sans-serif;
  font-size: 11px; font-weight: 800; flex-shrink: 0;
}
.tier-A { background: var(--gold-dim); color: var(--gold); }
.tier-B { background: var(--blue-dim); color: var(--blue); }
.tier-C { background: var(--surface-3); color: var(--text-3); }
.tier-D { background: var(--red-dim); color: var(--red); }

.result-badge {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 22px; height: 20px; padding: 0 6px; border-radius: 999px;
  font-family: "Barlow Condensed", sans-serif;
  font-size: 12px; font-weight: 900; flex-shrink: 0;
  letter-spacing: 0.5px;
}
.result-hit { background: var(--green-dim); color: var(--green); }
.result-miss { background: var(--red-dim); color: var(--red); }
.result-pending { background: var(--surface-3); color: var(--text-3); }

/* COMING SOON */
.coming-soon { padding: 48px 20px; text-align: center; }
.coming-soon-icon { font-size: 32px; margin-bottom: 12px; }
.coming-soon-title {
  font-family: "Barlow Condensed", sans-serif;
  font-size: 18px; font-weight: 800; letter-spacing: 2px;
  text-transform: uppercase; color: var(--text-2); margin-bottom: 6px;
}
.coming-soon-sub { font-size: 12px; color: var(--text-3); }

/* GAME CARDS */
.section-label {
  font-family: "Barlow Condensed", sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--text-3);
  margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
}
.section-label::before {
  content: ""; display: inline-block;
  width: 3px; height: 12px; background: var(--gold); border-radius: 2px;
}

.games-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}

.game-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
  transition: border-color 0.15s, box-shadow 0.15s;
  animation: fadeUp 0.3s ease both;
}
.game-card:hover { border-color: var(--border-2); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.game-card:nth-child(1) { animation-delay: 0.05s; }
.game-card:nth-child(2) { animation-delay: 0.10s; }
.game-card:nth-child(3) { animation-delay: 0.15s; }
.game-card:nth-child(4) { animation-delay: 0.20s; }

.game-card-head {
  padding: 10px 12px 8px; background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: flex-start;
}

.game-matchup {
  font-family: "Barlow Condensed", sans-serif;
  font-size: 16px; font-weight: 800; letter-spacing: 0.5px; line-height: 1;
}
.game-time { font-size: 11px; color: var(--text-3); margin-top: 3px; }

.game-market-count {
  font-family: "Barlow Condensed", sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--text-3);
  display: flex; align-items: center; gap: 4px;
}
.signal-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--green);
  box-shadow: 0 0 6px rgba(47,158,87,0.6);
}

.game-card-body { padding: 9px 12px 12px; }
.signals-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 12px; }

.signal-row { display: flex; align-items: center; gap: 8px; }
.signal-player-wrap { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }

.market-tag {
  flex-shrink: 0;
  font-family: "Barlow Condensed", sans-serif;
  font-size: 10px; font-weight: 800; letter-spacing: 1px;
  text-transform: uppercase; border-radius: 3px; padding: 2px 6px;
  min-width: 32px; text-align: center;
}
.market-HR { background: rgba(224,68,62,0.15); color: var(--red); }
.market-K  { background: rgba(0,0,0,0.06); color: var(--text-2); }
.market-TB { background: var(--blue-dim); color: var(--blue); }
.market-Hits { background: var(--green-dim); color: var(--green); }
.market-ML { background: var(--surface-3); color: var(--text-2); }
.market-PTS { background: rgba(224,122,31,0.15); color: var(--wnba); }
.market-REB { background: rgba(130,87,217,0.15); color: var(--tennis); }
.market-AST { background: rgba(2,132,199,0.15); color: var(--soccer); }
.market-3PM { background: rgba(47,127,212,0.15); color: var(--blue); }
.market-GS { background: rgba(47,158,87,0.15); color: var(--green); }
.market-OU, .market-O\/U { background: rgba(47,158,87,0.15); color: var(--gold); }
.market-Sets { background: rgba(130,87,217,0.15); color: var(--tennis); }

.signal-player { flex: 1; min-width: 0; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.signal-line { font-family: "Barlow Condensed", sans-serif; font-size: 13px; font-weight: 700; color: var(--text-2); white-space: nowrap; flex-shrink: 0; }

.open-slate-btn {
  width: 100%; padding: 8px;
  background: var(--surface-3); border: 1px solid var(--border);
  border-radius: 6px;
  font-family: "Barlow Condensed", sans-serif;
  font-size: 12px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--text-2);
  transition: all 0.15s;
}
.open-slate-btn:hover {
  background: var(--gold-dim); border-color: rgba(47,158,87,0.3); color: var(--gold);
}

.controls-row {
  display: grid;
  grid-template-columns: minmax(200px, 1.35fr) repeat(3, minmax(112px, 0.72fr));
  gap: 10px;
}

.board-input,
.board-select {
  width: 100%;
  padding: 9px 11px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
}

.board-input::placeholder { color: var(--text-3); }

.explorer-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.workspace-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 320px;
  gap: 16px;
  align-items: start;
}

.workspace-main {
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-width: 0;
}

.workspace-rail {
  position: sticky;
  top: 104px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-width: 0;
}

.rail-section {
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-width: 0;
}

.explorer-column {
  min-width: 0;
}

.lane-label {
  font-family: "Barlow Condensed", sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: var(--text-3);
  padding: 0 2px;
}

.lane-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
}

.lane-kicker {
  font-family: "Barlow Condensed", sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.4px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 6px;
}

.lane-sub {
  font-size: 12px;
  color: var(--text-3);
}

.game-card.live { border-color: rgba(47,158,87,0.22); }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.8); backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.open { display: flex; }

.modal-panel {
  background: var(--surface); border: 1px solid var(--border-2);
  border-radius: 12px; width: min(900px, 100%); max-height: 85vh;
  overflow: hidden; display: flex; flex-direction: column;
  box-shadow: 0 24px 64px rgba(0,0,0,0.6);
}

.modal-head {
  padding: 16px 20px; background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.modal-title { font-family: "Barlow Condensed", sans-serif; font-size: 22px; font-weight: 900; letter-spacing: 1px; }
.modal-subtitle { font-size: 12px; color: var(--text-3); margin-top: 2px; }

.modal-close {
  width: 32px; height: 32px; border-radius: 6px;
  background: var(--surface-3); border: 1px solid var(--border);
  color: var(--text-2); font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.modal-close:hover { background: var(--red-dim); color: var(--red); border-color: rgba(224,68,62,0.3); }

.modal-tabs {
  padding: 0 20px; background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  display: flex; gap: 0; overflow-x: auto;
  scrollbar-width: none; flex-shrink: 0;

<script>
const DATA_FILES = {
  picks: "data/picks.json",
  mlb: "data/mlb.json",
  nba: "data/nba.json",
  wnba: "data/wnba.json",
  nfl: "data/nfl.json",
  soccer: "data/soccer.json",
  tennis: "data/tennis.json",
};

const COMING_SOON = {
  nba: { icon: "??", label: "NBA" },
  wnba: { icon: "??", label: "WNBA" },
  nfl: { icon: "??", label: "NFL" },
  soccer: { icon: "?", label: "Soccer" },
  tennis: { icon: "??", label: "Tennis" },
};

const cache = {};
const SPORT_ORDER = ["mlb", "nba", "wnba", "soccer", "tennis"];
const SPORT_LABELS = {
  picks: "Picks of the Day",
  mlb: "MLB",
  nba: "NBA",
  wnba: "WNBA",
  nfl: "NFL",
  soccer: "Soccer",
  tennis: "Tennis",
};

function esc(str) {
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// Format ISO 8601 UTC (e.g. "2026-05-09T14:30:00Z") as ET wall-clock
// string ("10:30 AM ET"). Returns "" on parse failure so callers can
// fall back to legacy per-sport last_updated.
function formatUpdatedAt(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "";
  try {
    const parts = new Intl.DateTimeFormat("en-US", {
      timeZone: "America/New_York",
      hour: "numeric",
      minute: "2-digit",
      hour12: true,
    }).formatToParts(d);
    const hour = parts.find(p => p.type === "hour")?.value;
    const minute = parts.find(p => p.type === "minute")?.value;
    const ampm = parts.find(p => p.type === "dayPeriod")?.value;
    if (!hour || !minute || !ampm) return "";
    return `${hour}:${minute} ${ampm} ET`;
  } catch (e) {
    return "";
  }
}

function scoreClass(s) {
  return s >= 30 ? "score-high" : s >= 20 ? "score-mid" : "score-low";
}

function tierBadge(tier) {
  return `<span class="tier-badge tier-${esc(tier)}">${esc(tier || "C")}</span>`;
}

function marketTag(m) {
  return `<span class="market-tag market-${esc(m)}">${esc(m)}</span>`;
}

const SPORT_ICON = {
  mlb: "⚾",      // baseball ⚾
  nba: "🏀",  // basketball 🏀
  wnba: "🏀", // basketball 🏀
  nfl: "🏈",  // football 🏈
  soccer: "⚽",    // soccer ball ⚽
  tennis: "🎾", // tennis ball 🎾
};

function playerHeadshot(player, sport) {
  if (!player || !player.player_id) return "";
  const id = esc(player.player_id);
  if (sport === "mlb") {
    return `https://img.mlbstatic.com/mlb-photos/image/upload/w_72,q_auto:best/v1/people/${id}/headshot/67/current`;
  }
  if (sport === "nba") {
    return `https://a.espncdn.com/i/headshots/nba/players/full/${id}.png`;
  }
  if (sport === "wnba") {
    return `https://a.espncdn.com/i/headshots/wnba/players/full/${id}.png`;
  }
  return "";
}

function sportFallback(sport, klass) {
  const icon = SPORT_ICON[sport] || "";
  return `<div class="${klass} sport-fallback" data-sport="${esc(sport)}" aria-hidden="true">${icon}</div>`;
}

function playerFace(player, sport, small = false) {
  const klass = small ? "player-face-sm" : "player-face";
  const src = playerHeadshot(player, sport);
  if (!src) return sportFallback(sport, klass);
  const fallback = sportFallback(sport, klass).replace(/'/g, "&#39;").replace(/"/g, "&quot;");
  return `<img class="${klass}" src="${src}" alt="${esc(player.player_name)}" loading="lazy" referrerpolicy="no-referrer" onerror="this.outerHTML='${fallback}'">`;
}

function playerButton(player, sport, extraClass = "") {
  if (!player) return "";
  return `<button class="player-link ${extraClass}" data-player-id="${esc(player.player_id)}" data-sport="${esc(sport)}">${esc(player.player_name)}</button>`;
}

function impliedOddsBadge(player) {
  const odds = player?.implied_odds;
  if (!odds) return "";
  const zone = String(player.value_zone || "aim").toLowerCase();
  const zoneClass = ["aim", "value", "longshot", "lean"].includes(zone) ? zone : "aim";
  const title = `Value zone: ${zone.toUpperCase()}${player.edge != null ? ` • Edge ${player.edge >= 0 ? "+" : ""}${Number(player.edge).toFixed(2)}` : ""}`;
  return `<span class="implied-odds-badge zone-${zoneClass}" title="${esc(title)}">${esc(odds)}</span>`;
}

function lineupBadges(player) {
  if (!player) return "";
  const chips = [];
  const stars = Array.isArray(player.team_star_outs) ? player.team_star_outs : [];
  if (stars.length) {
    const headline = stars[0];
    const extras = stars.length > 1 ? ` +${stars.length - 1}` : "";
    const boost = Number(player.team_usage_boost || 1.0);
    const boostLabel = boost > 1.01 ? ` • Usage ${boost.toFixed(2)}x` : "";
    const tip = `Star teammate${stars.length > 1 ? "s" : ""} OUT: ${stars.join(", ")}${boostLabel}`;
    chips.push(`<span class="lineup-badge lineup-star-out" title="${esc(tip)}">★ ${esc(headline)}${esc(extras)} OUT</span>`);
  }
  const gtdStars = Array.isArray(player.team_star_gtd) ? player.team_star_gtd : [];
  if (gtdStars.length) {
    const headline = gtdStars[0];
    const extras = gtdStars.length > 1 ? ` +${gtdStars.length - 1}` : "";
    const tip = `Star teammate${gtdStars.length > 1 ? "s" : ""} GTD — line could move pre-tip: ${gtdStars.join(", ")}`;
    chips.push(`<span class="lineup-badge lineup-teammate-gtd" title="${esc(tip)}">⚠ ${esc(headline)}${esc(extras)} GTD</span>`);
  }
  const status = String(player.lineup_status || "").toUpperCase();
  if (status === "GTD") {
    chips.push(`<span class="lineup-badge lineup-gtd" title="Game-time decision — confirm before locking in">GTD</span>`);
  }
  return chips.join("");
}

function hrResultBadge(player) {
  if (!player || !player.hr_result) return "";
  if (player.hr_result === "hit") {
    const count = Number(player.home_runs || 1);
    return `<span class="result-badge result-hit" title="${esc(count + " HR")}">${count > 1 ? `${count}HR` : "HR"}</span>`;
  }
  if (player.hr_result === "miss") {
    return `<span class="result-badge result-miss" title="Final: no HR">0</span>`;
  }
  return "";
}

function rowsForGame(data, team, opponent) {
  return flattenBoardRows(data).filter(row =>
    String(row.team || "").toUpperCase() === String(team || "").toUpperCase() &&
    String(row.opponent || "").toUpperCase() === String(opponent || "").toUpperCase()
  );
}

function resolveHrPickStatus(pick, data) {
  if (!pick) return { state: "pending", label: "Pending", title: "Game has not settled yet." };
  const matchingRows = rowsForGame(data, pick.team, pick.opponent).filter(row =>
    String(row.player_name || "").toUpperCase() === String(pick.player_name || "").toUpperCase()
  );
  const hrRow = matchingRows.find(row => String(row.market || "").toUpperCase() === "HR") || matchingRows[0];
  if (hrRow?.hr_result === "hit") {
    const count = Number(hrRow.home_runs || 1);
    return {
      state: "hit",
      label: count > 1 ? `${count} HR` : "HR",
      title: `${pick.player_name} homered${count > 1 ? ` ${count} times` : ""}.`,
    };
  }
  if (hrRow?.hr_result === "miss") {
    return { state: "miss", label: "Miss", title: `${pick.player_name} finished without a home run.` };
  }
  const game = (data?.games || []).find(g =>
    String(g.away || "").toUpperCase() === String(pick.team || "").toUpperCase() && String(g.home || "").toUpperCase() === String(pick.opponent || "").toUpperCase()
      || String(g.home || "").toUpperCase() === String(pick.team || "").toUpperCase() && String(g.away || "").toUpperCase() === String(pick.opponent || "").toUpperCase()
  );
  if (game && isFinalGame(game)) {
    return { state: "miss", label: "Miss", title: `${pick.player_name} finished without a home run.` };
  }
  return { state: "pending", label: "Pending", title: "Still live or waiting for first pitch." };
}

function renderStatusChip(status) {
  return `<span class="status-chip status-${esc(status.state || "pending")}" title="${esc(status.title || "")}">${esc(status.label || "Pending")}</span>`;
}

function normalizeDash(value) {
  return value || "?";
}

function localIsoDate() {
  const now = new Date();
  const offset = now.getTimezoneOffset();
  const local = new Date(now.getTime() - offset * 60000);
  return local.toISOString().slice(0, 10);
}

function isTodaySlate(data) {
  return !!data?.date && data.date === localIsoDate();
}

function isLiveGame(game) {
  const stamp = `${game?.time || ""} ${game?.status || ""}`.toLowerCase();
  if (!stamp) return false;
  if (/(final|ppd|postponed|canceled|cancelled)/.test(stamp)) return false;
  return /(top|bot|mid|live|q[1-4]|ot|half|inning|set \d|break|suspended|delay|delayed)/.test(stamp);
}

function isFinalGame(game) {
  const stamp = `${game?.time || ""} ${game?.status || ""}`.toLowerCase();
  return /(final|ppd|postponed|canceled|cancelled)/.test(stamp);
}

function gameSortStamp(game) {
  const raw = String(game?.game_date || "");
  const parsed = Date.parse(raw);
  return Number.isNaN(parsed) ? Number.MAX_SAFE_INTEGER : parsed;
}

function sortGamesChronologically(games = []) {
  return [...games].sort((a, b) => gameSortStamp(a) - gameSortStamp(b));
}

function laneEmpty(title, text) {
  return `<div class="lane-card"><div class="lane-kicker">${esc(title)}</div><div class="lane-sub">${esc(text)}</div></div>`;
}

async function loadSport(sport) {
  if (cache[sport]) return cache[sport];
  try {
    const r = await fetch(`${DATA_FILES[sport]}?v=${Date.now()}`);
    if (!r.ok) throw new Error(`Failed to load ${sport}`);
    const data = await r.json();
    cache[sport] = data;
    return data;
  } catch (e) {
    return null;
  }
}

function cloneRow(row, marketOverride = "") {
  if (!row) return null;
  return {
    player_id: row.player_id,
    player_name: row.player_name,
    team: row.team,
    opponent: row.opponent,
    line: row.line,
    score: row.score,
    tier: row.tier || "C",
    reason: row.reason || "",
    market: marketOverride || row.market || "",
  };
}

function lineFloorValue(line) {
  const match = String(line || "").match(/(\d+(?:\.\d+)?)/);
  return match ? Number(match[1]) : 0;
}

function desiredLineFloor(sport, market) {
  const floors = {
    mlb: { HR: 1, Hits: 2, TB: 2, RBI: 2, K: 6 },
    nba: { PTS: 15, AST: 5, REB: 6, "3PM": 2 },
    wnba: { PTS: 12, AST: 4, REB: 5, "3PM": 2 },
    soccer: { GS: 1 },
    tennis: { ML: 0, Sets: 2, "O/U": 20.5 },
  };
  return (floors[sport] || {})[market] ?? 0;
}

function propQualityScore(row, sport) {
  if (!row) return -999;
  const market = row.market || "";
  const tierBonus = row.tier === "A" ? 5 : row.tier === "B" ? 2 : row.tier === "C" ? -2 : -6;
  const marketBonusMap = {
    mlb: { HR: 4, Hits: 3, TB: 3, RBI: 2, K: 1 },
    nba: { PTS: 2, AST: 3, REB: 2.5, "3PM": 1 },
    wnba: { PTS: 2, AST: 3, REB: 2.5, "3PM": 1 },
    soccer: { GS: 3, OU: 0 },
    tennis: { ML: 3, Sets: 2, "O/U": 0.5 },
  };
  const marketBonus = (marketBonusMap[sport] || {})[market] || 0;
  const floor = desiredLineFloor(sport, market);
  const lineValue = lineFloorValue(row.line);
  const lineBonus = lineValue >= floor ? (lineValue - floor) * 0.6 : -10 - (floor - lineValue) * 3;
  const reason = String(row.reason || "");
  const formBonus =
    (/L5\s+(8|9|100)/i.test(reason) ? 2 : 0) +
    (/H2H/i.test(reason) ? 1.2 : 0) +
    (/WHIP/i.test(reason) ? 0.8 : 0) +
    (/Platoon \+/i.test(reason) ? 0.8 : 0) +
    (/Rising|Uptick/i.test(reason) ? 0.8 : 0) +
    (/Decline/i.test(reason) ? -1.4 : 0);
  return Number(row.score || 0) + tierBonus + marketBonus + lineBonus + formBonus;
}

function dedupeRows(rows) {
  const seen = new Set();
  const deduped = [];
  for (const row of rows || []) {
    if (!row) continue;
    const key = `${row.player_id || row.player_name}:${row.market || ""}:${row.line || ""}`;
    if (seen.has(key)) continue;
    seen.add(key);
    deduped.push(row);
  }
  return deduped;
}

function selectDailyRows(rows, sport, count, opts = {}) {
  const { sameGameMax = count, sameTeamMax = count } = opts;
  const ranked = dedupeRows(rows)
    .filter(row => row && propQualityScore(row, sport) > 0)
    .sort((a, b) => propQualityScore(b, sport) - propQualityScore(a, sport));

  const selected = [];
  const gameCounts = new Map();
  const teamCounts = new Map();

  for (const row of ranked) {
    const gameId = row.game_id || `${row.team}-${row.opponent}`;
    const team = row.team || row.player_name;
    if ((gameCounts.get(gameId) || 0) >= sameGameMax) continue;
    if ((teamCounts.get(team) || 0) >= sameTeamMax) continue;
    selected.push(row);
    gameCounts.set(gameId, (gameCounts.get(gameId) || 0) + 1);
    teamCounts.set(team, (teamCounts.get(team) || 0) + 1);
    if (selected.length >= count) break;
  }

  return selected;
}

function deriveSportPicks(sport, data) {
  if (!data) return null;

  if (sport === "mlb") {
    const hr = data.daily_hr_picks || {};
    return {
      straight: cloneRow(hr.single, "HR"),
      twoLeg: (hr.two_leg?.legs || []).map(row => cloneRow(row, "HR")).filter(Boolean),
      threeLeg: (hr.three_leg?.legs || []).map(row => cloneRow(row, "HR")).filter(Boolean),
    };
  }

  if (sport === "nba") {
    const pool = [
      ...(data.research_board?.safe_plays?.players || []),
      ...(data.research_board?.sections?.PTS || []),
      ...(data.research_board?.sections?.AST || []),
      ...(data.research_board?.sections?.REB || []),
      ...(data.research_board?.sections?.["3PM"] || []),
    ].map(row => cloneRow(row, row.market)).filter(Boolean);
    const straight = selectDailyRows(pool, "nba", 1, { sameGameMax: 1, sameTeamMax: 1 })[0] || cloneRow(data.hero_pick, data.hero_pick?.market || "");
    const safe = selectDailyRows(pool, "nba", 8, { sameGameMax: 2, sameTeamMax: 1 });
    return {
      straight,
      twoLeg: safe.slice(0, 2),
      threeLeg: safe.slice(0, 3),
    };
  }

  if (sport === "wnba") {
    const pool = [
      ...(data.section_boards?.PTS?.players || []),
      ...(data.section_boards?.AST?.players || []),
      ...(data.section_boards?.REB?.players || []),
      ...(data.section_boards?.["3PM"]?.players || []),
    ];
    const deduped = [];
    const seen = new Set();
    for (const row of pool) {
      const key = `${row.player_id}:${row.line}`;
      if (seen.has(key)) continue;
      seen.add(key);
      deduped.push(cloneRow(row, row.market || ""));
    }
    const straight = selectDailyRows(deduped, "wnba", 1, { sameGameMax: 1, sameTeamMax: 1 })[0] || cloneRow(data.hero_pick, data.hero_pick?.market || "");
    const safe = selectDailyRows(deduped, "wnba", 8, { sameGameMax: 2, sameTeamMax: 1 });
    return {
      straight,
      twoLeg: safe.slice(0, 2),
      threeLeg: safe.slice(0, 3),
    };
  }

  if (sport === "soccer") {
    const top = (data.pinned_board?.players || []).map(row => cloneRow(row, data.pinned_board?.market || "GS"));
    const picks = selectDailyRows(top, "soccer", 4, { sameGameMax: 1, sameTeamMax: 1 });
    return {
      straight: picks[0] || top[0] || null,
      twoLeg: picks.slice(0, 2),
      threeLeg: picks.slice(0, 3),
    };
  }

  if (sport === "tennis") {
    const top = (data.pinned_board?.players || []).map(row => cloneRow(row, data.pinned_board?.market || "ML"));
    const picks = selectDailyRows(top, "tennis", 4, { sameGameMax: 1, sameTeamMax: 1 });
    return {
      straight: picks[0] || top[0] || null,
      twoLeg: picks.slice(0, 2),
      threeLeg: picks.slice(0, 3),
    };
  }

  return null;
}

function shortSportLabel(sport) {
  return (SPORT_LABELS[sport] || sport || "").toUpperCase();
}

function summarizePickReason(row, sport) {
  if (!row?.reason) return [];
  const tokens = String(row.reason).split("|").map(part => part.trim()).filter(Boolean);
  const sportRules = {
    mlb: [/edge/i, /^L5/i, /^matchup/i, /^WHIP/i, /^RISP/i, /^vs /i, /^order/i],
    nba: [/edge/i, /^L5/i, /matchup/i, /usage/i, /minutes/i, /h2h/i],
    wnba: [/^L5/i, /matchup/i, /^Prev/i, /^Pre/i, /Uptick/i, /Decline/i],
    soccer: [/edge/i, /^L5/i, /matchup/i, /goals/i, /xg/i],
    tennis: [/edge/i, /^L5/i, /matchup/i, /h2h/i, /surface/i],
  };
  const patterns = sportRules[sport] || [/edge/i, /^L5/i, /matchup/i];
  const keepers = [];
  for (const token of tokens) {
    if (patterns.some(pattern => pattern.test(token))) keepers.push(token);
    if (keepers.length === 4) break;
  }
  return keepers.length ? keepers : tokens.slice(0, 3);
}

function renderReasonChips(row, sport) {
  const chips = summarizePickReason(row, sport);
  if (!chips.length) return `<span class="pick-empty">No edge note yet.</span>`;
  return chips.map(chip => `<span class="reason-chip">${esc(chip)}</span>`).join("");
}

    .map(([sport, data]) => ({

    }))
    .filter(item => item.picks?.straight)
    .slice(0, 3);
  if (!heroRows.length) return "";
  // Single source of truth: picks.json top-level updated_at (ISO 8601 UTC,
  // written by write_picks_snapshot at freeze time). Fall back to the
  // legacy per-sport last_updated scan only if updated_at is missing.
  const latest = formatUpdatedAt(updatedAtIso)
    || (heroRows.map(item => item.data?.last_updated || "").find(Boolean) || "");
  const sports = heroRows.map(item => shortSportLabel(item.sport));

      <div class="picks-hero-inner">
        <div class="picks-hero-copy">

          <div class="picks-hero-meta">

}

function marketPriority(row = {}) {

  if (market === "HR") return 5;
  if (market === "RBI") return 4;
  if (market === "TB") return 3;
  if (market === "K") return 2;
  if (market === "HITS") return 1;
  return 0;
}

function sortRowsForPinnedArea(rows = []) {
  return [...rows].sort((a, b) => {
    const marketGap = marketPriority(b) - marketPriority(a);
    if (marketGap) return marketGap;
    const scoreGap = Number(b.score || 0) - Number(a.score || 0);
    if (scoreGap) return scoreGap;
    return String(a.player || "").localeCompare(String(b.player || ""));
  });
}

function collectMlbKRows(data, limit = 5) {
  // Walk every game's K market rows and rank: A-tier first, then by score desc.
  // The K market lives only inside games[].markets.K — no featured board carries
  // it today, so this surfaces it for the MLB tab's K block.
  const rows = [];
  for (const game of (data?.games || [])) {
    for (const row of ((game.markets && game.markets.K) || [])) {
      if (row) rows.push(row);
    }
  }
  rows.sort((a, b) => {
    const tierRank = t => ({ A: 2, B: 1 }[String(t || "C")] || 0);
    const tg = tierRank(b.tier) - tierRank(a.tier);
    if (tg) return tg;
    return Number(b.score || 0) - Number(a.score || 0);
  });
  return rows.slice(0, limit);
}

    for (const r of (rows || [])) {
      if (!r || r.player_id == null) continue;
      const id = String(r.player_id);
      if (seen.has(id)) continue;
      seen.add(id);
      pool.push(r);
    }
  };
  add(data?.pinned_board?.players);
  add(data?.watch_board?.players);
  for (const g of (data?.games || [])) add(g.markets?.HR || []);
  return pool;
}

if (!window.__hrBoardHooked) {
  window.__hrBoardHooked = true;

  function hrSafe(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, (m) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
  }
  function hrParlayLegs() {
    const legs = [];
    document.querySelectorAll(".hr-card.hr-card-selected[data-hr-id]").forEach((c) => {
      const name = c.querySelector(".core-name")?.textContent?.trim() || c.dataset.hrName || "?";
      legs.push({
        name,
        team: c.dataset.hrTeam || "",
        market: c.dataset.hrMarket || "",
        line: c.dataset.hrLine || "",
        simPct: Number(c.dataset.hrSim) || 0,
      });
    });
    return legs;
  }
  function hrParlayMath(legs) {
    if (!legs.length) return { prob: 0, american: null };
    const prob = legs.reduce((p, l) => p * (Math.max(l.simPct, 0.001) / 100), 1);
    if (!isFinite(prob) || prob <= 0) return { prob: 0, american: null };
    const dec = 1 / prob;
    const american = dec >= 2 ? Math.round((dec - 1) * 100) : Math.round(-100 / (dec - 1));
    return { prob, american };
  }
  function hrRenderParlayPanel() {
    const existing = document.getElementById("hr-parlay-panel");
    const legs = hrParlayLegs();
    if (!legs.length) { if (existing) existing.remove(); return; }
    const { prob, american } = hrParlayMath(legs);
    const amStr = american == null ? "—" : (american > 0 ? `+${american}` : String(american));
    const legsHtml = legs.map((l) =>
      `<li><span class="leg-name">${hrSafe(l.name)}</span>` +
      `<span class="leg-prob">${hrSafe(l.team)} ${hrSafe(l.line)} · ${l.simPct.toFixed(0)}%</span></li>`
    ).join("");
    const html = `
      <div id="hr-parlay-panel" class="hr-parlay-panel">
        <div class="hr-parlay-head">
          <div class="hr-parlay-title">${legs.length}-Leg Parlay</div>
          <div class="hr-parlay-stats">Combined <span>${(prob * 100).toFixed(1)}%</span> &middot; Fair <span>${amStr}</span></div>
          <button class="hr-card-clear-btn" data-hr-parlay-close="1">Close</button>
        </div>
        <ul class="hr-parlay-legs">${legsHtml}</ul>
      </div>`;
    const board = document.querySelector(".hr-board-card");
    if (!board) return;
    if (existing) existing.outerHTML = html;
    else board.insertAdjacentHTML("afterend", html);
  }
  function hrSyncActionButtons() {
    const controls = document.querySelector(".hr-board-card .hr-controls");
    if (!controls) return;
    const has = hrSelectedIds.size > 0;
    let buildBtn = controls.querySelector("[data-hr-build]");
    if (has && !buildBtn) {
      buildBtn = document.createElement("button");
      buildBtn.className = "hr-parlay-btn";
      buildBtn.setAttribute("data-hr-build", "1");
      buildBtn.textContent = "Build Parlay";
      controls.appendChild(buildBtn);
    } else if (!has && buildBtn) {
      buildBtn.remove();
    }
    let clearBtn = controls.querySelector("[data-hr-clear]");
    if (has && !clearBtn) {
      clearBtn = document.createElement("button");
      clearBtn.className = "hr-card-clear-btn";
      clearBtn.setAttribute("data-hr-clear", "1");
      clearBtn.textContent = "Clear";
      controls.appendChild(clearBtn);
    } else if (!has && clearBtn) {
      clearBtn.remove();
    }
  }

  function hrFairAmericanFromProb(prob) {
    if (!isFinite(prob) || prob <= 0 || prob >= 1) return null;
    const dec = 1 / prob;
    return dec >= 2 ? Math.round((dec - 1) * 100) : Math.round(-100 / (dec - 1));
  }
  function hrFmtAmer(a) { return a == null ? "—" : (a > 0 ? "+" + a : String(a)); }
  function hrRunMonteCarlo(legs, trials) {
    const N = legs.length;
    const probs = legs.map((l) => Math.max(Math.min(l.simPct / 100, 0.999), 0.001));
    const counts = new Array(N + 1).fill(0);
    for (let t = 0; t < trials; t++) {
      let hits = 0;
      for (let i = 0; i < N; i++) if (Math.random() < probs[i]) hits++;
      counts[hits]++;
    }
    return counts.map((c) => c / trials);
  }
  function hrBuildSubsetLadder(legs) {
    const sorted = [...legs].sort((a, b) => b.simPct - a.simPct);
    const rows = [];
    for (let k = 2; k <= sorted.length; k++) {
      const subset = sorted.slice(0, k);
      const prob = subset.reduce((p, l) => p * (l.simPct / 100), 1);
      rows.push({ k, subset, prob, fair: hrFairAmericanFromProb(prob) });
    }
    return rows;
  }
  function hrRecommendation(ladder) {
    let rec = null;
    for (const row of ladder) if (row.prob >= 0.10) rec = row;
    return rec || ladder[0] || null;
  }
  function hrOpenParlayPage() {
    const legs = hrParlayLegs();
    if (legs.length < 2) { hrRenderParlayPanel(); return; }
    const TRIALS = 25000;
    const dist = hrRunMonteCarlo(legs, TRIALS);
    const ladder = hrBuildSubsetLadder(legs);
    const rec = hrRecommendation(ladder);
    const expected = dist.reduce((s, p, k) => s + p * k, 0);
    const maxDist = Math.max(...dist, 0.0001);

    const recHtml = rec ? `
      <div class="parlay-recommend">
        <div class="label">Recommended Build</div>
        <div class="pick">${rec.k}-Leg Parlay &middot; ${(rec.prob * 100).toFixed(1)}% &middot; Fair ${hrFmtAmer(rec.fair)}</div>
        <div class="stats">${rec.subset.map((l) => `<strong>${hrSafe(l.name)}</strong>`).join(" + ")}</div>
        <div class="stats" style="margin-top:8px;color:var(--text-3);font-size:11px;">Largest subset with combined model hit rate &ge; 10% (fair odds; no book edge in this repo).</div>
      </div>` : "";
    const legsHtml = legs.map((l) =>
      `<li><span class="leg-name">${hrSafe(l.name)}</span>` +
      `<span class="leg-prob">${hrSafe(l.team)} ${hrSafe(l.line)} &middot; ${l.simPct.toFixed(0)}%</span></li>`
    ).join("");
    const mcHtml = dist.map((p, k) => {
      const h = Math.round((p / maxDist) * 100);
      return `<div class="parlay-mc-col" title="${k} of ${legs.length} legs hit">` +
        `<div class="val">${(p * 100).toFixed(0)}%</div>` +
        `<div class="fill" style="height:${h}%"></div>` +
        `<div class="kx">${k}/${legs.length}</div>` +
        `</div>`;
    }).join("");
    const ladderHtml = ladder.map((row) => {
      const recCls = (rec && row.k === rec.k) ? " recommended" : "";
      return `<div class="parlay-ladder-row${recCls}">` +
        `<div class="parlay-ladder-k">${row.k}-leg</div>` +
        `<div class="parlay-ladder-picks">${row.subset.map((l) => hrSafe(l.name)).join(" + ")}</div>` +
        `<div class="parlay-ladder-stats">P <span>${(row.prob * 100).toFixed(1)}%</span> &middot; Fair <span>${hrFmtAmer(row.fair)}</span></div>` +
        `</div>`;
    }).join("");

    const html = `
      <div id="parlay-page" class="parlay-page open">
        <div class="parlay-page-head">
          <button class="parlay-back" data-parlay-back="1">&larr; Back to Board</button>
          <div class="parlay-page-title">Parlay Analyzer</div>
          <div class="parlay-page-meta">${legs.length} selected &middot; ${TRIALS.toLocaleString()} MC trials</div>
        </div>
        <div class="parlay-page-body">
          ${recHtml}
          <div>
            <div class="parlay-section-title">Selected Legs</div>
            <ul class="hr-parlay-legs">${legsHtml}</ul>
          </div>
          <div>
            <div class="parlay-section-title">Monte Carlo Distribution</div>
            <div class="parlay-section-sub">P(K of ${legs.length} legs hit) over ${TRIALS.toLocaleString()} trials &middot; expected hits ${expected.toFixed(2)}</div>
            <div class="parlay-mc-bar">${mcHtml}</div>
          </div>
          <div>
            <div class="parlay-section-title">Subset Ladder</div>
            <div class="parlay-section-sub">Top-K legs by simulated probability &mdash; the recommendation is highlighted.</div>
            <div class="parlay-ladder">${ladderHtml}</div>
          </div>
        </div>
      </div>`;
    document.getElementById("parlay-page")?.remove();
    document.body.insertAdjacentHTML("beforeend", html);
    document.body.style.overflow = "hidden";
  }
  function hrCloseParlayPage() {
    document.getElementById("parlay-page")?.remove();
    document.body.style.overflow = "";
  }

  document.addEventListener("click", function (e) {
    // CARD TOGGLE
    const card = e.target.closest(".hr-card[data-hr-id]");
    if (card) {
      const id = card.dataset.hrId;
      const nowSelected = !hrSelectedIds.has(id);
      if (nowSelected) hrSelectedIds.add(id); else hrSelectedIds.delete(id);
      card.classList.toggle("hr-card-selected", nowSelected);
      let tick = card.querySelector(".hr-card-tick");
      if (nowSelected && !tick) {
        tick = document.createElement("div");
        tick.className = "hr-card-tick";
        tick.textContent = "✓";
        card.insertBefore(tick, card.firstChild);
      } else if (!nowSelected && tick) {
        tick.remove();
      }
      const cnt = document.getElementById("hr-selected-count");
      if (cnt) cnt.textContent = hrSelectedIds.size;
      hrSyncActionButtons();
      if (document.getElementById("hr-parlay-panel")) hrRenderParlayPanel();
      return;
    }
    // BUILD PARLAY — opens the full-screen analyzer page
    if (e.target.closest("[data-hr-build]")) { hrOpenParlayPage(); return; }
    // PARLAY BACK — closes the analyzer page
    if (e.target.closest("[data-parlay-back]")) { hrCloseParlayPage(); return; }
    // INLINE PARLAY PANEL CLOSE (1-leg fallback)
    if (e.target.closest("[data-hr-parlay-close]")) {
      document.getElementById("hr-parlay-panel")?.remove();
      return;
    }
    // SORT
    const sortBtn = e.target.closest("[data-hr-sort]");
    if (sortBtn) {
      hrSortMode = sortBtn.dataset.hrSort;
      const ctrls = sortBtn.closest(".hr-controls");
      ctrls?.querySelectorAll("[data-hr-sort]").forEach((b) =>
        b.classList.toggle("active", b.dataset.hrSort === hrSortMode)
      );
      const grid = sortBtn.closest(".hr-board-card")?.querySelector(".core-grid");
      if (grid) {
        const cards = Array.from(grid.querySelectorAll(".hr-card[data-hr-id]"));
        cards.sort((a, b) => {
          if (hrSortMode === "name") return (a.dataset.hrName || "").localeCompare(b.dataset.hrName || "");
          if (hrSortMode === "sim") return (Number(b.dataset.hrSim) || 0) - (Number(a.dataset.hrSim) || 0);
          return (Number(b.dataset.hrScore) || 0) - (Number(a.dataset.hrScore) || 0);
        });
        cards.forEach((c) => grid.appendChild(c));
      }
      return;
    }
    // CLEAR
    if (e.target.closest("[data-hr-clear]")) {
      hrSelectedIds.clear();
      document.querySelectorAll(".hr-card.hr-card-selected").forEach((c) => {
        c.classList.remove("hr-card-selected");
        c.querySelector(".hr-card-tick")?.remove();
      });
      const cnt = document.getElementById("hr-selected-count");
      if (cnt) cnt.textContent = "0";
      hrSyncActionButtons();
      document.getElementById("hr-parlay-panel")?.remove();
    }
  });
}

function renderDiamondWidget(diamond) {
  const slots = [["1B", "First Base"], ["2B", "Second Base"], ["3B", "Third Base"], ["HOME", "Home Plate"], ["MOUND", "Mound"]];
  const picks = diamond.picks || {};
  const card = (pos, label) => {
    const pick = picks[pos];
    if (!pick) {
      return `<article class="core-card"><div class="core-body"><div class="core-base-label">${esc(label)}</div><div class="core-name">—</div></div></article>`;
    }
    const row = { player_id: pick.player_id, player_name: pick.name, team: pick.team, opponent: pick.opponent, line: pick.line, tier: pick.tier };
    const prob = pick.sim_prob_pct != null ? `${Number(pick.sim_prob_pct).toFixed(0)}%` : "";
    return `
      <article class="core-card">
        <div class="core-card-top">
          <div class="core-rank-wrap">
            <div class="core-rank">${esc(pos)}</div>
            ${playerFace(row, "mlb").replace('class="player-face"', 'class="player-face core-face"')}
          </div>
          ${prob ? `<span class="sim-prob-badge">${prob}</span>` : ""}
        </div>
        <div class="core-body">
          <div class="core-base-label">${esc(label)} · ${esc(pick.market)}</div>
          <div class="core-name">${playerButton(row, "mlb", "core-name")}</div>
          <div class="core-meta"><span>${esc(pick.team)}</span><span>vs ${esc(pick.opponent)}</span></div>
        </div>
        <div class="core-line-row">
          <div class="core-line">${esc(pick.line)}</div>

function renderMlbPinnedBoards(data) {
  const hrRows = (data?.pinned_board?.players || []).length ? data.pinned_board.players : collectMlbHrRows(data).slice(0, 3);
  if (!hrRows.length) return "";
  const watchRows = (data?.watch_board?.players || []).length
    ? data.watch_board.players
    : collectMlbHrRows(data).slice(3, 10);
  // Diamond of the Day now carries all 10 HR names. First 3 from the core
  // pinned board, then up to 7 from the watch board, capped at 10. The
  // separate Fringe Watchlist block is gone — slots 5–10 just show rank.
  const diamondRows = [
    hrRows[0] || null,
    hrRows[1] || null,
    hrRows[2] || null,
    ...watchRows,
  ].filter(Boolean).slice(0, 10);
  const diamondLabels = ["Home Plate", "First Base", "Second Base", "Third Base"];
  // Strikeout Plays takes over the Secondary Lanes slot. Top 5 K rows, A-tier
  // first, then by score. If the slate has zero K candidates, the block hides
  // (same gating pattern as the old Secondary Lanes).
  const kRows = collectMlbKRows(data, 5);
  const hasDiamond = data.diamond && data.diamond.picks && Object.keys(data.diamond.picks).length;
  return `
    <div class="mlb-board-main">
      ${hasDiamond ? renderDiamondWidget(data.diamond) : `
      <div class="board-card mlb-board-compact">
        <div class="board-header">
          <div class="board-header-copy">
            <div class="board-title">Diamond of the Day</div>
            <div class="board-subtitle">Today's top 10 HR names — base labels on the core four, rank-only past that.</div>
          </div>
          <div class="board-count">${diamondRows.length} Names</div>
        </div>
        <div class="core-grid">
          ${diamondRows.map((player, index) => renderMlbCoreCard(player, index, diamondLabels[index] || "")).join("")}
        </div>
      </div>`}
      ${renderExpandedHrBoard(data)}
      ${kRows.length ? `
        <div class="board-card mlb-board-compact">
          <div class="board-header">
            <div class="board-header-copy">
              <div class="board-title">Strikeout Plays</div>
              <div class="board-subtitle">Today's pitcher K board, A-tier first then ranked by score.</div>
            </div>
            <div class="board-count">${kRows.length} Arms</div>
          </div>
          <div class="support-list">
            ${kRows.map(player => renderMlbSupportRow(player)).join("")}
          </div>
        </div>` : ""}
      ${renderSimSection(data.sim_board, "mlb")}
    </div>`;
}

function renderPinnedBoards(data, sport = "mlb") {
  if (sport === "mlb") return renderMlbPinnedBoards(data);
  const sections = [];
  if (sport === "wnba" && data?.double_double_watch?.players?.length) sections.push(renderDoubleDoubleWatch(data.double_double_watch));
  if (data?.pinned_board?.players?.length) sections.push(renderPinnedSection(data.pinned_board, sport));
  if (data?.best_available_board?.players?.length) sections.push(renderPinnedSection(data.best_available_board, sport, { showMarket: true }));
  if (data?.consistency_board?.players?.length) sections.push(renderPinnedSection(data.consistency_board, sport));
  if (data?.sim_board?.players?.length) sections.push(renderSimSection(data.sim_board, sport));
  return sections.length ? `<div class="pinned-stack">${sections.join("")}</div>` : "";
}

  const signals = (game.top_signals || []).slice(0, 3);
  const markets = game.markets || {};
  const activeMarkets = Object.keys(markets).filter(k => markets[k] && markets[k].length);
  const liveClass = isLiveGame(game) ? "live" : isFinalGame(game) ? "final" : "scheduled";
  const timeLabel = isFinalGame(game) ? "Final" : (game.time || game.status || "TBD");
  // Park + wind environment chip — display only, never feeds scoring.
  // Renders only when the backend env enrichment populated game.env.
  const env = game.env;
  const leanClass = env && env.hr_lean === "HR boost" ? "env-boost"
                  : env && env.hr_lean === "HR suppress" ? "env-suppress"
                  : "env-neutral";
  const envChip = env && env.summary_chip
    ? `<div class="game-env ${leanClass}">${esc(env.summary_chip)}</div>`
    : "";
  return `
    <div class="game-card ${liveClass}">
      <div class="game-card-head">
        <div>
          <div class="game-matchup">${esc(game.matchup)}</div>
          <div class="game-time">${esc(timeLabel)}</div>
        </div>
        <div class="game-market-count">
          <span class="signal-dot"></span>${activeMarkets.length} Markets

      ${envChip}
      <div class="game-card-body">
        <div class="signals-list">

            <div class="signal-row">
              ${marketTag(s.market)}
              ${renderSignalPlayer(s, sport)}
              <div class="signal-line">${esc(s.line)}</div>

function renderModalBody(game, filter, sport) {
  const markets = game.markets || {};
  const keys = filter === "all" ? Object.keys(markets) : [filter];
  let html = "";

  for (const market of keys) {
    const players = markets[market] || [];
    if (!players.length) {
      if (filter !== "all") html += `<div class="empty-market">No picks for ${esc(market)}</div>`;
      continue;
    }
    html += filter === "all"
      ? `<div class="market-section"><div class="market-section-title">${esc(market)}</div>${renderPlayerTable(players, sport)}</div>`
      : renderPlayerTable(players, sport);
  }

  const body = document.getElementById("modal-body");
  body.innerHTML = html || `<div class="empty-market">No data available</div>`;
  bindPlayerClicks(body, cache[sport], sport);
}

function openModal(game, sport) {
  const markets = game.markets || {};
  const activeMarkets = Object.keys(markets).filter(k => markets[k] && markets[k].length);
  document.getElementById("modal-title").textContent = game.matchup;
  document.getElementById("modal-subtitle").textContent = game.time || game.status || "TBD";

  const tabs = ["all", ...activeMarkets];
  document.getElementById("modal-tabs").innerHTML = tabs.map(m => `
    <button class="modal-tab ${m === "all" ? "active" : ""}" data-market="${esc(m)}">${m === "all" ? "All Markets" : esc(m)}</button>
  `).join("");

  document.querySelectorAll(".modal-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".modal-tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      renderModalBody(game, tab.dataset.market, sport);
    });

  renderModalBody(game, "all", sport);
  document.getElementById("modal-overlay").classList.add("open");

}

function closeModal() {

}

function flattenBoardRows(data) {
  const rows = [];
  for (const game of data?.games || []) {
    for (const [market, players] of Object.entries(game.markets || {})) {
      for (const player of players || []) {
        rows.push({ ...player, market, matchup: game.matchup, time: game.time, game_id: game.game_id });
      }
    }
  }
  return rows;
}

function bindExplorerControls(view, data, sport) {
  const controls = view.querySelectorAll("[data-role='search'], [data-role='market'], [data-role='tier'], [data-role='sort']");
  controls.forEach(control => {
    control.addEventListener("input", () => applyExplorerFilters(view, data, sport));
    control.addEventListener("change", () => applyExplorerFilters(view, data, sport));
  });
}

function renderExplorerGrouped(rows, sport) {
  const groups = rows.reduce((acc, row) => {
    const key = row.matchup || "Unknown matchup";
    if (!acc.has(key)) acc.set(key, []);
    acc.get(key).push(row);
    return acc;
  }, new Map());

  return `<div class="explorer-groups">
    ${Array.from(groups.entries()).map(([matchup, groupRows]) => {
      const time = groupRows[0]?.time || "TBD";
      return `
        <section class="explorer-group">
          <div class="explorer-group-head">
            <div class="explorer-group-title">${esc(matchup)}</div>
            <div class="explorer-group-meta">${groupRows.length} rows • ${esc(time)}</div>
          </div>
          ${renderExplorerTableRows(groupRows, sport, true)}
        </section>`;
    }).join("")}
  </div>`;
}

function applyExplorerFilters(view, data, sport) {
  const search = (view.querySelector("[data-role='search']")?.value || "").trim().toLowerCase();
  const market = view.querySelector("[data-role='market']")?.value || "";
  const tier = view.querySelector("[data-role='tier']")?.value || "";
  const sort = view.querySelector("[data-role='sort']")?.value || "score-desc";

  let rows = flattenBoardRows(data).filter(row => {
    if (market && row.market !== market) return false;
    if (tier && row.tier !== tier) return false;
    if (!search) return true;
    const haystack = [row.player_name, row.team, row.opponent, row.matchup, row.line, row.market].join(" ").toLowerCase();
    return haystack.includes(search);
  });

  rows.sort((a, b) => {
    if (sort === "score-asc") return (a.score || 0) - (b.score || 0);
    if (sort === "player-asc") return String(a.player_name || "").localeCompare(String(b.player_name || ""));
    if (sort === "game-asc") return String(a.matchup || "").localeCompare(String(b.matchup || ""));
    if (sort === "market-asc") return String(a.market || "").localeCompare(String(b.market || ""));
    return (b.score || 0) - (a.score || 0);
  });

  view.querySelector("[data-role='explorer-count']").textContent = `${rows.length} rows`;
  const explorer = view.querySelector("[data-role='explorer']");
  if (!rows.length) {
    explorer.innerHTML = `<div class="explorer-empty">No rows match your filters.</div>`;
    return;
  }

  const useGroupedExplorer = !search && sort === "score-desc";
  explorer.innerHTML = useGroupedExplorer
    ? renderExplorerGrouped(rows, sport)
    : renderExplorerTableRows(rows, sport);

  bindPlayerClicks(explorer, data, sport);
}

function extractRecentFormMetrics(rows, sport) {
  const metrics = [];
  const patternMap = {
    mlb: [
      { label: "L5", regex: /\bL5\s+([0-9.]+(?:%|\/g)?)/i },
      { label: "L10", regex: /\bL10\s+([0-9.]+(?:%|\/g)?)/i },
      { label: "Matchup", regex: /\bMatchup\s+([0-9.]+x?)/i },
      { label: "WHIP", regex: /\bWHIP\s+([0-9.]+)/i },
      { label: "RISP", regex: /\bRISP\s+([0-9.]+)/i },
      { label: "Order", regex: /\bOrder(?: est\.)?\s+([0-9]+)/i },
    ],
    nba: [
      { label: "L5", regex: /\bL5\s+([0-9.]+%?)/i },
      { label: "L10", regex: /\bL10\s+([0-9.]+%?)/i },
      { label: "Usage", regex: /\bUSG\s+([0-9.]+%)/i },
      { label: "Minutes", regex: /\bMIN\s+([0-9.]+)/i },
      { label: "H2H", regex: /\bH2H\s+([0-9.]+%?)/i },
      { label: "Matchup", regex: /\bmatchup\s+([0-9.]+x?)/i },
    ],
    wnba: [
      { label: "L5", regex: /\bL5\s+([0-9.]+%?)/i },
      { label: "L10", regex: /\bL10\s+([0-9.]+%?)/i },
      { label: "Prev", regex: /\bPrev\s+([0-9.]+)/i },
      { label: "Pre", regex: /\bPre\s+([0-9.]+)/i },
      { label: "Trend", regex: /\b(Uptick|Decline)\s+([0-9.]+)/i, joinGroups: true },
      { label: "Minutes", regex: /\bMIN\s+([0-9.]+)/i },
    ],
    soccer: [
      { label: "L5", regex: /\bL5\s+([0-9.]+%?)/i },
      { label: "Edge", regex: /\bEdge\s+([0-9.]+)/i },
      { label: "Matchup", regex: /\bmatchup\s+([0-9.]+x?)/i },
      { label: "xG", regex: /\bxG\s+([0-9.]+)/i },
    ],
    tennis: [
      { label: "L5", regex: /\bL5\s+([0-9.]+%?)/i },
      { label: "Edge", regex: /\bEdge\s+([0-9.]+)/i },
      { label: "H2H", regex: /\bH2H\s+([0-9.]+%?)/i },
      { label: "Surface", regex: /\bSurface\s+([A-Za-z0-9.%-]+)/i },
    ],
  };
  const patterns = patternMap[sport] || patternMap.mlb;
  const reasons = rows.map(row => String(row.reason || ""));
  for (const rule of patterns) {
    let found = "";
    for (const reason of reasons) {
      const match = reason.match(rule.regex);
      if (match) {
        found = rule.joinGroups ? match.slice(1).join(" ") : match[1];
        break;
      }
    }
    if (found) metrics.push({ label: rule.label, value: found });
  }
  return metrics.slice(0, 6);
}

function renderRecentFormSection(rows, sport) {
  const metrics = extractRecentFormMetrics(rows, sport);
  if (!metrics.length) {
    return `
      <div class="player-section">

        <div class="lane-sub">Recent form metrics will appear here as the board reasons populate.</div>

  }
  return `
    <div class="player-section">
      <div class="player-section-title">Recent Form</div>
      <div class="player-stat-grid">
        ${metrics.map(metric => `
          <div class="player-stat-card">

            <div class="player-stat-value">${esc(metric.value)}</div>
          </div>`).join("")}

}

function renderQuarterProfileSection(rows) {
  const qp = rows.map(r => r.quarter_profile).find(Boolean);
  if (!qp || !qp.sample) return "";
  const q4Closer = (qp.q4_share || 0) >= 0.28 && (qp.sample || 0) >= 4;
  const qtrCard = (label, val, closer = false) => `
    <div class="player-stat-card${closer ? " qtr-closer" : ""}">
      <div class="player-stat-label">${label}${closer ? " ★" : ""}</div>
      <div class="player-stat-value">${Number(val || 0).toFixed(1)}</div>
    </div>`;
  return `
    <div class="player-section">
      <div class="player-section-title">Q by Q</div>
      <div class="quarter-profile-grid">
        ${qtrCard("Q1", qp.q1_avg)}
        ${qtrCard("Q2", qp.q2_avg)}
        ${qtrCard("Q3", qp.q3_avg)}
        ${qtrCard("Q4", qp.q4_avg, q4Closer)}
      </div>
      <div class="qtr-sample">${qp.sample} game${qp.sample === 1 ? "" : "s"} • Q4 ${Math.round((qp.q4_share || 0) * 100)}% of pts${q4Closer ? " • Q4 Closer" : ""}</div>
    </div>`;
}

function openPlayerPanel(playerId, sport, data) {
  const rows = flattenBoardRows(data).filter(row => String(row.player_id) === String(playerId));
  if (!rows.length) return;
  const player = rows[0];
  document.getElementById("player-panel-title").textContent = player.player_name;
  document.getElementById("player-panel-subtitle").textContent = `${player.team} vs ${player.opponent} • ${rows.length} board row${rows.length === 1 ? "" : "s"}`;

  const scoreValues = rows.map(r => Number(r.score || 0));
  const avgScore = scoreValues.reduce((sum, val) => sum + val, 0) / scoreValues.length;
  const topTier = rows.map(r => r.tier).sort()[0] || "C";
  const body = document.getElementById("player-panel-body");
  body.innerHTML = `
    <div class="player-stat-grid">
      <div class="player-stat-card"><div class="player-stat-label">Top Line</div><div class="player-stat-value">${esc(rows[0].line)}</div></div>
      <div class="player-stat-card"><div class="player-stat-label">Avg Score</div><div class="player-stat-value">${avgScore.toFixed(1)}</div></div>
      <div class="player-stat-card"><div class="player-stat-label">Best Tier</div><div class="player-stat-value">${esc(topTier)}</div></div>
      <div class="player-stat-card"><div class="player-stat-label">Markets</div><div class="player-stat-value">${rows.map(r => r.market).filter((v, i, arr) => arr.indexOf(v) === i).join(", ")}</div></div>
    </div>
    ${renderRecentFormSection(rows, sport)}
    ${(sport === "nba" || sport === "wnba") ? renderQuarterProfileSection(rows) : ""}
    <div class="player-section">
      <div class="player-section-title">Board Detail</div>
      ${playerReasonList(rows)}
    </div>`;

  document.getElementById("player-panel-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closePlayerPanel() {
  document.getElementById("player-panel-overlay").classList.remove("open");
  if (!document.getElementById("modal-overlay").classList.contains("open")) {
    document.body.style.overflow = "";
  }
}

function bindPlayerClicks(container, data, sport) {
  container.querySelectorAll(".player-link").forEach(button => {
    button.addEventListener("click", () => openPlayerPanel(button.dataset.playerId, button.dataset.sport || sport, data));
  });
}

async function renderGameView(sport, data) {
  const view = document.getElementById(`view-${sport}`);
  if (!data || !data.games || !data.games.length) {
    const cs = COMING_SOON[sport];
    if (cs) {
      view.innerHTML = `<div class="coming-soon"><div class="coming-soon-icon">${cs.icon}</div><div class="coming-soon-title">${cs.label} Coming Soon</div><div class="coming-soon-sub">Backend pipeline will populate this board automatically.</div></div>`;
    } else {
      view.innerHTML = `<div class="coming-soon"><div class="coming-soon-title">No Games Today</div><div class="coming-soon-sub">Check back when the bot runs.</div></div>`;
    }
    return;
  }

  document.getElementById(`tab-count-${sport}`).textContent = data.games.length;
  const rows = flattenBoardRows(data);
  const markets = [...new Set(rows.map(row => row.market))].sort();
  const liveGames = sortGamesChronologically(data.games.filter(isLiveGame));
  const completedGames = sortGamesChronologically(data.games.filter(isFinalGame));
  const upcomingGames = sortGamesChronologically(
    data.games.filter(game => !isLiveGame(game) && !isFinalGame(game))
  );
  const pinnedMarkup = renderPinnedBoards(data, sport);
  const picksPayload = await loadSport("picks");
  // MLB / NBA / WNBA tabs no longer duplicate the Morning Card —
  // it lives on the Cross-Sport Daily Board on Picks of the Day.
  // Soccer / Tennis tabs are untouched per spec.
  const TAB_HIDES_FROZEN_CARD = new Set(["mlb", "nba", "wnba"]);
  const frozenPickMarkup = !TAB_HIDES_FROZEN_CARD.has(sport) && picksPayload?.sports?.[sport]
    ? renderFrozenDailySummaryCard(sport, picksPayload.sports[sport], data)
    : "";

  view.innerHTML = `
    <div class="section-label">Today's Games - ${esc(data.date || "")}</div>
    <div class="workspace-layout">
      <div class="workspace-main">
        ${frozenPickMarkup}
        ${pinnedMarkup}
        <div class="explorer-wrap">
          <div class="explorer-head">
            <div class="explorer-title">Board Explorer</div>
            <div class="explorer-count" data-role="explorer-count">${rows.length} rows</div>
          </div>
          <div class="explorer-toolbar">
            <div class="controls-row">
              <input class="board-input" data-role="search" type="search" placeholder="Filter player, team, opponent, or game">
              <select class="board-select" data-role="market">
                <option value="">All markets</option>
                ${markets.map(market => `<option value="${esc(market)}">${esc(market)}</option>`).join("")}
              </select>
              <select class="board-select" data-role="tier">
                <option value="">All tiers</option>
                <option value="A">A only</option>
                <option value="B">B only</option>
                <option value="C">C only</option>
              </select>
              <select class="board-select" data-role="sort">
                <option value="score-desc">Score high to low</option>
                <option value="score-asc">Score low to high</option>
                <option value="player-asc">Player A-Z</option>
                <option value="game-asc">Game A-Z</option>
                <option value="market-asc">Market A-Z</option>
              </select>
            </div>
          </div>
          <div class="explorer-scroll" data-role="explorer"></div>
        </div>
      </div>
      <aside class="workspace-rail">
        <div class="rail-section">
          <div class="lane-label">In Progress</div>
          <div class="games-grid">
            ${liveGames.length ? liveGames.map(g => renderGameCard(g, sport)).join("") : laneEmpty("No live games", "These lanes will move here once play starts.")}
          </div>
        </div>
        <div class="rail-section">
          <div class="lane-label">Upcoming</div>
          <div class="games-grid">
            ${upcomingGames.length ? upcomingGames.map(g => renderGameCard(g, sport)).join("") : laneEmpty("No upcoming games", "Later first pitches will stay here until they go live.")}
          </div>
        </div>
        <div class="rail-section">
          <div class="lane-label">Earlier Today</div>
          <div class="games-grid">
            ${completedGames.length ? completedGames.map(g => renderGameCard(g, sport)).join("") : laneEmpty("No finals yet", "Finished games will stay here so the slate doesn’t feel like it vanished.")}
          </div>
        </div>
      </aside>
    </div>`;

  view.querySelectorAll(".open-slate-btn").forEach(btn => {
    const game = data.games.find(g => g.game_id === btn.dataset.gameId);
    if (game) btn.addEventListener("click", () => openModal(game, sport));
  });

  bindPlayerClicks(view, data, sport);
  bindExplorerControls(view, data, sport);
  applyExplorerFilters(view, data, sport);
}

async function switchSport(sport) {
  document.querySelectorAll(".sport-tab").forEach(t => t.classList.toggle("active", t.dataset.sport === sport));
  document.querySelectorAll(".sport-view").forEach(v => v.classList.toggle("active", v.id === `view-${sport}`));
  if (sport === "picks") {
    await renderPicksView();
    return;
  }
  const data = await loadSport(sport);
  await renderGameView(sport, data);

  if (data) {
    document.getElementById("header-date").textContent = normalizeDash(data.date);
    document.getElementById("header-updated").textContent = normalizeDash(data.last_updated);
  } else {
    document.getElementById("header-date").textContent = "-";
    document.getElementById("header-updated").textContent = "-";
  }
}

document.querySelectorAll(".sport-tab").forEach(t => t.addEventListener("click", () => switchSport(t.dataset.sport)));
document.getElementById("modal-close").addEventListener("click", closeModal);
document.getElementById("modal-overlay").addEventListener("click", e => { if (e.target.id === "modal-overlay") closeModal(); });
document.getElementById("player-panel-close").addEventListener("click", closePlayerPanel);
document.getElementById("player-panel-overlay").addEventListener("click", e => { if (e.target.id === "player-panel-overlay") closePlayerPanel(); });
document.addEventListener("keydown", e => {
  if (e.key === "Escape") {
    closeModal();
    closePlayerPanel();
  }
});

switchSport("picks");
</script>
</body>
</html>
