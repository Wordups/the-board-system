<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#080b0e">
  <meta name="description" content="The Board — a decision-first sports signal desk.">
  <title>The Board · Signal Desk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/board.css">
</head>
<body>
  <a class="skip-link" href="#app">Skip to the board</a>

  <nav class="site-switch" aria-label="Board network">
    <span class="site-switch-label">The Board Network</span>
    <a class="site-tab active" href="https://wordups.github.io/the-board-system/" aria-current="page">Sports Board</a>
    <a class="site-tab" href="https://wordups.github.io/the-board-market/">Stock Market</a>
  </nav>

  <header class="site-header">
    <a class="brand" href="#today" aria-label="The Board home">
      <span class="brand-mark" aria-hidden="true"><i></i><i></i><i></i></span>
      <span><strong>THE BOARD</strong><small>SIGNAL DESK</small></span>
    </a>
    <nav class="primary-nav" aria-label="Primary navigation" id="primary-nav"></nav>
    <div class="header-status">
      <span class="status-pulse" aria-hidden="true"></span>
      <span id="header-freshness">Loading slate</span>
    </div>
  </header>

  <div class="mobile-sport-nav" id="mobile-sport-nav" aria-label="Sports"></div>

  <main id="app" tabindex="-1">
    <section class="loading-state" aria-live="polite">
      <div class="loading-orbit" aria-hidden="true"></div>
      <p>Resolving the signal field…</p>
    </section>
  </main>

  <div class="drawer-backdrop" id="drawer-backdrop" hidden></div>
  <aside class="signal-drawer" id="signal-drawer" aria-label="Selection detail" aria-hidden="true">
    <button class="drawer-close" id="drawer-close" type="button" aria-label="Close selection detail">Close <span>×</span></button>
    <div id="drawer-content"></div>
  </aside>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <noscript>The Board needs JavaScript to rank and filter the slate.</noscript>
  <script src="data/snapshot.js"></script>
  <script src="assets/board.js"></script>
</body>
</html>
