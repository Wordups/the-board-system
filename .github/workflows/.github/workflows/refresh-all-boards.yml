name: Refresh All Boards

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run all board refreshes
        run: python backend/scripts/run_all.py

      - name: Commit refreshed board data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add backend/data_final/*.json frontend/data/*.json
          git commit -m "refresh all boards" || echo "No changes"
          git push
