name: Refresh Live Boards

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Run live board refresh
        run: |
          python backend/scripts/run_all.py

      - name: Commit updated board data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add backend/data_final/mlb.json frontend/data/mlb.json data/mlb.json
          git add backend/data_final/nba.json frontend/data/nba.json data/nba.json
          git add backend/data_final/wnba.json frontend/data/wnba.json data/wnba.json
          git add backend/data_final/soccer.json frontend/data/soccer.json data/soccer.json
          git add backend/data_final/tennis.json frontend/data/tennis.json data/tennis.json
          git commit -m "refresh live boards" || echo "No changes to commit"
          git push
